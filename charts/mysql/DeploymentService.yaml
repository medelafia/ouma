apiVersion: apps/v1
kind: Deployment
metadata:
  name: mysql
  namespace: monitoring
spec:
  selector:
    matchLabels:
      app: mysql
  strategy:
    type: Recreate
  template:
    metadata:
      namespace: monitoring
      labels:
        app: mysql
    spec:
      containers:
      - image: mysql:latest
        name: mysql
        envFrom:
          - configMapRef:
              name: mysql-config-map
        ports:
        - containerPort: 3306
          name: mysql
        volumeMounts:
        - name: mysql-persistent-storage
          mountPath: /var/lib/mysql
      volumes:
      - name: mysql-persistent-storage
        persistentVolumeClaim:
          claimName: mysql-pv-claim
---
apiVersion: v1
kind: Service
metadata:
  name: mysql
  namespace: monitoring
spec:
  ports:
  - port: 3306
  selector:
    app: mysql